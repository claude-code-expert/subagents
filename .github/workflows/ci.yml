name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck install.sh hooks/squad-router.sh

      - name: Router keyword tests
        run: bash tests/test-router.sh

      - name: File integrity tests
        run: bash tests/test-files.sh

      - name: Check install script runs
        run: bash install.sh --version
